<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全效英語實戰學習中心</title>
    <style>
        :root {
            --primary-bg: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
            --accent-speaking: #3498db;
            --accent-listen: #9b59b6;
            --accent-read: #e67e22;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard-container {
            width: 100%;
            max-width: 480px; /* 手機與平板適用的舒適寬度 */
        }

        .header-section {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 1.6rem;
            margin: 0 0 10px 0;
            color: var(--text-main);
            letter-spacing: 1px;
        }

        /* 身份切換區塊 - 手機好按的大區塊 */
        .user-selector {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-selector label {
            font-weight: bold;
            font-size: 1.1rem;
            color: #34495e;
        }

        select {
            padding: 10px 15px;
            font-size: 1.1rem;
            border: 2px solid #bdc3c7;
            border-radius: 10px;
            background-color: #fff;
            color: #2c3e50;
            font-weight: bold;
            outline: none;
            cursor: pointer;
            width: 60%;
        }

        select:focus {
            border-color: #3498db;
        }

        /* 入口按鈕網格 - 兩排設計 */
        .module-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 大按鈕共用樣式 */
        .btn-entry {
            display: flex;
            align-items: center;
            padding: 18px 20px;
            border-radius: 16px;
            text-decoration: none;
            background: var(--card-bg);
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            border: 2px solid transparent;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            /* 讓手機觸控沒有藍色預設高亮 */
            -webkit-tap-highlight-color: transparent; 
        }

        /* 手機按壓時的動態回饋 */
        .btn-entry:active {
            transform: scale(0.97);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 各模組專屬色彩配置 */
        .btn-speaking { border-left: 6px solid var(--accent-speaking); }
        .btn-listen { border-left: 6px solid var(--accent-listen); }
        .btn-read { border-left: 6px solid var(--accent-read); }

        .btn-icon {
            font-size: 2rem;
            margin-right: 15px;
            min-width: 45px;
            text-align: center;
        }

        .btn-text {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .btn-title {
            font-size: 1.15rem;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .btn-subtitle {
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        .section-title {
            font-size: 1.1rem;
            color: var(--text-sub);
            margin: 20px 0 10px 5px;
            font-weight: bold;
            display: flex;
            align-items: center;
        }
        
        .section-title::before {
            content: '';
            display: inline-block;
            width: 15px;
            height: 3px;
            background: #bdc3c7;
            margin-right: 8px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    
    <div class="header-section">
        <h1>全效英語實戰學習中心</h1>
    </div>

    <div class="user-selector">
        <label for="currentUser">當前使用者：</label>
        <select id="currentUser">
            <option value="Derek">Derek</option>
            <option value="Joanna">Joanna</option>
            <option value="Guest">訪客模式 (不記錄)</option>
        </select>
    </div>

    <div class="module-grid">
        
        <div class="section-title">實戰表達訓練</div>
        <a href="javascript:void(0)" onclick="navigateTo('speaking.html', null)" class="btn-entry btn-speaking">
            <div class="btn-icon">🌍</div>
            <div class="btn-text">
                <span class="btn-title">情境口說實戰</span>
                <span class="btn-subtitle">突破語感 ‧ 打造直覺反應迴路</span>
            </div>
        </a>

        <div class="section-title">多益聽力特訓 (Listening)</div>
        
        <a href="javascript:void(0)" onclick="navigateTo('toeic.html', 'Part1')" class="btn-entry btn-listen">
            <div class="btn-icon">👁️</div>
            <div class="btn-text">
                <span class="btn-title">Part 1 影像辨識</span>
                <span class="btn-subtitle">照片描述 ‧ 敏銳捕捉畫面細節</span>
            </div>
        </a>

        <a href="javascript:void(0)" onclick="navigateTo('toeic.html', 'Part2')" class="btn-entry btn-listen">
            <div class="btn-icon">⚡</div>
            <div class="btn-text">
                <span class="btn-title">Part 2 瞬效聽解</span>
                <span class="btn-subtitle">應答問題 ‧ 鍛鍊直覺秒殺能力</span>
            </div>
        </a>

        <a href="javascript:void(0)" onclick="navigateTo('toeic.html', 'Part3')" class="btn-entry btn-listen">
            <div class="btn-icon">🤝</div>
            <div class="btn-text">
                <span class="btn-title">Part 3 商務對談</span>
                <span class="btn-subtitle">簡短對話 ‧ 商業邏輯與意圖拆解</span>
            </div>
        </a>

        <a href="javascript:void(0)" onclick="navigateTo('toeic.html', 'Part4')" class="btn-entry btn-listen">
            <div class="btn-icon">📣</div>
            <div class="btn-text">
                <span class="btn-title">Part 4 獨白解析</span>
                <span class="btn-subtitle">廣播公告 ‧ 高效擷取核心資訊</span>
            </div>
        </a>

        <div class="section-title">多益閱讀特訓 (Reading)</div>

        <a href="javascript:void(0)" onclick="navigateTo('toeic.html', 'Part5')" class="btn-entry btn-read">
            <div class="btn-icon">🧩</div>
            <div class="btn-text">
                <span class="btn-title">Part 5 結構填空</span>
                <span class="btn-subtitle">單字文法 ‧ 穩健鞏固得分基礎</span>
            </div>
        </a>

        <a href="javascript:void(0)" onclick="navigateTo('toeic.html', 'Part6')" class="btn-entry btn-read">
            <div class="btn-icon">🔗</div>
            <div class="btn-text">
                <span class="btn-title">Part 6 語意連貫</span>
                <span class="btn-subtitle">段落克漏 ‧ 強化上下文推論力</span>
            </div>
        </a>

        <a href="javascript:void(0)" onclick="navigateTo('toeic.html', 'Part7')" class="btn-entry btn-read">
            <div class="btn-icon">📖</div>
            <div class="btn-text">
                <span class="btn-title">Part 7 長篇破解</span>
                <span class="btn-subtitle">閱讀測驗 ‧ 跨篇章資訊交叉統整</span>
            </div>
        </a>

    </div>
</div>

<script>
    // 🔒 安全防護：設定專屬密碼
    const USER_PASSWORDS = {
        "Derek": "0000",
        "Joanna": "0000"
    };

    // 智慧路由功能與密碼鎖
    function navigateTo(targetPage, part) {
        const user = document.getElementById('currentUser').value;
        
        // 驗證密碼邏輯
        if (user !== 'Guest') {
            // 使用 sessionStorage，關掉瀏覽器就自動登出，確保安全
            let isAuthed = sessionStorage.getItem(`auth_${user}`); 
            if (!isAuthed) {
                let pwd = prompt(`請輸入 ${user} 的專屬密碼：`);
                if (pwd === USER_PASSWORDS[user]) {
                    sessionStorage.setItem(`auth_${user}`, 'true');
                } else {
                    alert("❌ 密碼錯誤！請重新輸入。");
                    return; // 密碼錯誤則阻擋跳轉
                }
            }
        }

        // 密碼正確，打包網址傳遞
        let url = `${targetPage}?user=${encodeURIComponent(user)}`;
        if (part) {
            url += `&part=${part}`;
        }
        window.location.href = url;
    }

    // 大廳初始化時檢查身分
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const userParam = urlParams.get('user');
        if (userParam) {
            const userSelect = document.getElementById('currentUser');
            if (userSelect) {
                userSelect.value = userParam;
            }
        }
    });
</script>
</body>
</html>
