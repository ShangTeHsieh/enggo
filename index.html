<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雙效情境刷題系統</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        h1 { font-size: 1.5rem; color: #2c3e50; }
        .stats-board {
            display: flex;
            justify-content: space-around;
            background: #e8f5e9;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .stat-item { font-weight: bold; color: #2e7d32; }
        
        /* 卡片設計 */
        .card {
            background: #ffffff;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 30px 20px;
            margin-bottom: 20px;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .card:hover { border-color: #4CAF50; }
        .tag {
            font-size: 0.8rem;
            color: white;
            background: #1976d2;
            padding: 3px 8px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 10px;
        }
        .question { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; }
        .answer { font-size: 1.2rem; color: #1976d2; display: none; margin-bottom: 10px; }
        
        /* 按鈕設計 */
        .btn-group { display: none; gap: 10px; justify-content: center; }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }
        .btn-start { background: #4CAF50; width: 100%; display: block; }
        .btn-hard { background: #e53935; flex: 1; }
        .btn-good { background: #4CAF50; flex: 1; }
        .btn-easy { background: #1e88e5; flex: 1; }
        
        #loading { display: none; color: #7f8c8d; font-style: italic; margin-bottom: 15px;}
        #completion-screen { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 每日情境刷題</h1>
    
    <div class="stats-board">
        <div class="stat-item">🔥 連續打卡: <span id="streak-count">0</span> 天</div>
        <div class="stat-item">🛡️ 免死金牌: <span id="freeze-count">2</span> 面</div>
    </div>

    <div id="loading">讀取題庫中，請稍候...</div>

    <!-- 首頁區塊 -->
    <div id="home-screen">
        <p>今日待複習：<span id="due-count" style="font-weight:bold; color:#e53935;">0</span> 題</p>
        <button class="btn-start" id="start-btn" onclick="startReview()" style="display:none;">開始挑戰</button>
    </div>

    <!-- 刷題區塊 -->
    <div id="study-screen" style="display:none;">
        <div class="card" id="flashcard" onclick="flipCard()">
            <div id="card-tag" class="tag">標籤</div>
            <div id="card-question" class="question">載入中...</div>
            <div id="card-answer" class="answer">載入中...</div>
            <div style="font-size: 0.8rem; color: #999; margin-top: 10px;" id="click-hint">(點擊卡片看解答並發音)</div>
        </div>

        <div class="btn-group" id="score-btns">
            <button style="background:#f39c12;" onclick="scoreCard('repeat')">再試一次</button>
            <button class="btn-good" onclick="scoreCard('good')">普通<br>(明天)</button>
            <button class="btn-easy" onclick="scoreCard('easy')">熟悉<br>(+3天)</button>
            <button style="background:#9b59b6;" onclick="scoreCard('sos')">SOS<br>(救我)</button>
        </div>
    </div>

    <!-- 完成區塊 -->
    <div id="completion-screen">
        <h2>🎉 任務完成！</h2>
        <p>今日額度已達成，請將今日最有感的一句話分享到 LINE 群組並錄音！</p>
        <textarea id="share-text" style="width: 100%; height: 80px; margin-bottom: 10px; padding: 10px; border-radius: 5px; border: 1px solid #ccc;" readonly></textarea>
        <button class="btn-start" onclick="copyAndShare()">複製文字並開啟 LINE</button>
    </div>
</div>

<script>
// ⚠️ 請確認這裡是你自己的 API 網址 ⚠️
    const API_URL = "https://script.google.com/macros/s/AKfycbynSXDVVI2Y7N5CCKEOwsWiEF3PM5Ib97D4VC_71VeqSoaMrx0-TpY6gzwkBz_m8NMddA/exec";
    
    let cardsData = [];
    let statsData = {};
    let currentCardIndex = 0;
    let isFlipped = false;
    const DAILY_CAP = 15;

    window.onload = async function() {
        document.getElementById("loading").style.display = "block";
        try {
            let response = await fetch(API_URL + "?action=getData");
            let data = await response.json();
            
            statsData = data.stats;
            cardsData = data.cards.slice(0, DAILY_CAP); 
            
            document.getElementById("streak-count").innerText = statsData.streak || 0;
            document.getElementById("freeze-count").innerText = statsData.freezeTokens || 0;
            document.getElementById("due-count").innerText = cardsData.length;
            
            document.getElementById("loading").style.display = "none";
            
            if(cardsData.length > 0) {
                document.getElementById("start-btn").style.display = "block";
            } else {
                document.getElementById("home-screen").innerHTML = "<p>太棒了！今天沒有需要複習的題目了，好好休息吧！🍻</p>";
            }
        } catch (error) {
            document.getElementById("loading").innerText = "資料讀取失敗，請檢查網路或 API 網址設定。";
        }
    };

    function startReview() {
        document.getElementById("home-screen").style.display = "none";
        document.getElementById("study-screen").style.display = "block";
        loadCard();
    }

    function loadCard() {
        if (currentCardIndex >= cardsData.length) {
            finishDailyReview();
            return;
        }
        
        isFlipped = false;
        let card = cardsData[currentCardIndex];
        
        document.getElementById("card-tag").innerText = card.tag || "一般情境";
        document.getElementById("card-question").innerText = card.context_tw;
        document.getElementById("card-answer").innerText = card.sentence_en;
        
        document.getElementById("card-answer").style.display = "none";
        document.getElementById("score-btns").style.display = "none";
        document.getElementById("click-hint").innerText = "(點擊卡片看解答並發音)";
        document.getElementById("click-hint").style.display = "block";
    }

    function flipCard() {
        if (!isFlipped) {
            isFlipped = true;
            document.getElementById("card-answer").style.display = "block";
            document.getElementById("score-btns").style.display = "flex";
            document.getElementById("click-hint").innerText = "(點擊卡片可再次聆聽發音 🔊)";
        }
        
        // 修正：無論是不是第一次翻開，只要點擊就會重新發音
        let sentence = cardsData[currentCardIndex].sentence_en;
        let utterance = new SpeechSynthesisUtterance(sentence);
        utterance.lang = 'en-US';
        utterance.rate = 0.9; 
        window.speechSynthesis.speak(utterance);
    }

    async function scoreCard(score) {
        let card = cardsData[currentCardIndex];
        let interval = card.interval || 0;
        let isStuck = 0;
        let ease = card.easeFactor || 2.5; // 確保讀取 easeFactor 不會遺失

        if (score === 'repeat') {
            interval = 0;
            // 修正：將這張卡片複製一份，放到題庫陣列最後面，稍後會再次出現
            cardsData.push(Object.assign({}, card));
            // 對於「再試一次」，我們不急著寫回資料庫，等使用者最終選擇普通/熟悉時再寫入
            currentCardIndex++;
            loadCard();
            return; 
        } else if (score === 'sos') {
            // 修正：增加防呆確認視窗
            let confirmSOS = confirm("遇到瓶頸了嗎？\n確定要將此題標記為 SOS 嗎？(標記後將暫停出現，請於週末去試算表調整或請 AI 簡化)");
            if (!confirmSOS) return; // 按取消則留在原畫面
            isStuck = 1;
            interval = 0;
        } else if (score === 'good') {
            interval = 1;
        } else if (score === 'easy') {
            interval = 3;
            ease += 0.15; // 稍微增加熟練度係數
        }
        
        let nextDate = new Date();
        if(score !== 'sos') {
            nextDate.setDate(nextDate.getDate() + interval);
        }
        let formattedDate = nextDate.toISOString().split('T')[0];
        
        // 背景同步更新
        fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'updateCard',
                rowNumber: card.rowNumber,
                nextReviewDate: formattedDate,
                interval: interval,
                isStuck: isStuck,
                easeFactor: ease
            }),
            headers: { 'Content-Type': 'text/plain' }
        });
        
        currentCardIndex++;
        loadCard();
    }

    function finishDailyReview() {
        document.getElementById("study-screen").style.display = "none";
        document.getElementById("completion-screen").style.display = "block";
        
        // 修正：導入真實日期比對邏輯 (Date Diff)
        let today = new Date();
        today.setHours(0,0,0,0);
        let todayStr = today.toISOString().split('T')[0];
        
        let currentStreak = parseInt(statsData.streak) || 0;
        let freezeTokens = parseInt(statsData.freezeTokens) || 2;
        let lastLoginStr = statsData.lastLoginDate;
        
        let updateStats = false;
        
        if (!lastLoginStr || lastLoginStr === "") {
            currentStreak = 1; // 第一次玩
            updateStats = true;
        } else {
            let lastLogin = new Date(lastLoginStr);
            lastLogin.setHours(0,0,0,0);
            
            // 計算天數差
            let diffTime = Math.abs(today - lastLogin);
            let diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays === 1) {
                // 乖乖每天打卡
                currentStreak += 1;
                updateStats = true;
            } else if (diffDays > 1) {
                // 漏打卡了
                if (freezeTokens > 0) {
                    freezeTokens -= 1;
                    currentStreak += 1; 
                    alert(`您漏了 ${diffDays - 1} 天沒打卡！已自動消耗 1 面免死金牌 🛡️ 幫您維持連續紀錄！`);
                } else {
                    currentStreak = 1; 
                    alert("您漏打卡太久，且免死金牌已用盡，連續紀錄歸零。沒關係，重新出發吧！💪");
                }
                updateStats = true;
            }
            // diffDays === 0 的情況代表今天重複刷題，什麼都不做，不增加天數
        }

        if (updateStats) {
            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'updateStats',
                    lastLoginDate: todayStr,
                    streak: currentStreak,
                    freezeTokens: freezeTokens
                }),
                headers: { 'Content-Type': 'text/plain' }
            });
            document.getElementById("streak-count").innerText = currentStreak;
            document.getElementById("freeze-count").innerText = freezeTokens;
        }

        // 隨機挑選今天答過的一句話分享（移除自動開啟LINE的語法，讓你手動貼上）
        let shareText = `🔥 今日刷題完成！\n\n這是我今天的精選句：\n[${cardsData[0].tag}]\n${cardsData[0].context_tw}\n👉 ${cardsData[0].sentence_en}\n\n聽完我的語音，換你囉！`;
        document.getElementById("share-text").value = shareText;
    }

    function copyAndShare() {
        let text = document.getElementById("share-text");
        text.select();
        document.execCommand('copy');
        alert("已複製分享文字！請自行貼上至 LINE 群組。");
    }
</script>

</body>
</html>
